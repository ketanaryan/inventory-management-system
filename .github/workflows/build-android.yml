name: Build Android APK

on:
  push:
    branches:
      - main # Change this to your main branch if different
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your project's node version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      # Since Capacitor handles the Vercel URL directly, we skip Next.js static build!
      - name: Create Web Root Dummy
        run: |
          mkdir -p out
          echo "<html><body>Loading PharmaVerify...</body></html>" > out/index.html

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
